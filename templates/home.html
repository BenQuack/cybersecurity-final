<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <h1>Welcome to your Home Page {{ user }}</h1>
    <button id="ubtn" onclick="goUser()">User Panel</button>
    <button id="ebtn" onclick="goEngineer()">Engineer Panel</button>
    <button id="abtn" onclick="goAdmin()">Admin Panel</button>
    <button id="logout-btn">
        <a href="/logout" class="button">Logout</a>
    </button>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => btn.style.display = 'none');
        document.getElementById('logout-btn').style.display = 'inline-block';

        const perms = {{ permissions | tojson }};

        if (perms === 3) {
            document.getElementById('ubtn').style.display = 'inline-block';
        }
        if (perms < 3) {
            document.getElementById('ebtn').style.display = 'inline-block';
        }
        if (perms < 2) {
            document.getElementById('abtn').style.display = 'inline-block';
        }
    });

    function goUser()     { window.location.href = "{{ url_for('user_search') }}"; }
    function goEngineer() { window.location.href = "{{ url_for('eng_search') }}"; }
    function goAdmin()    { window.location.href = "{{ url_for('adm_search') }}"; }
</script>
</html>
